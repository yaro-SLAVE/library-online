services:
  library-service:
    environment:
      MODE: "prod"
      SITE_BASE_PATH: "${SITE_BASE_PATH:-/uz}"

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
      args:
        NGINX_PROFILE: "prod"
        VITE_OAUTH_CLIENT_ID: "${OAUTH_CLIENT_ID}"
        VITE_API_PREFIX: "${SITE_BASE_PATH:-/uz}"
        VITE_BASE_PATH: "${SITE_BASE_PATH:-/uz}"
    environment:
      SITE_BASE_PATH: "${SITE_BASE_PATH:-/uz}"
    restart: unless-stopped
    ports:
      - "${LIBRARY_PORT}:80"
    volumes:
      - media:/usr/share/nginx/html/media
      - django-static:/usr/share/nginx/html/static
    depends_on:
      postgres:
        condition: service_healthy
      library-service:
        condition: service_healthy
    networks:
      - library-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
