services:
  library-service:
    environment:
      DEBUG: "1"
      DJANGO_SETTINGS_MODULE: "prod_settings"
    command: python manage.py runserver 0.0.0.0:8000 --settings prod_settings
    volumes:
      - ./backend:/app
      - ./prod_settings.py:/app/prod_settings.py
    ports:
      - "8000:8000"

  frontend:
    image: node:24
    working_dir: /app
    volumes:
      - ./client:/app
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: "http://library-service:8000"
      VITE_OAUTH_CLIENT_ID: "${OAUTH_CLIENT_ID}"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
